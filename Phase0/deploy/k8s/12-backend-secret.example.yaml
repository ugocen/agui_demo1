# TEMPLATE — do not apply as-is and do not commit a filled-in copy.
#
# Contains the platform DB URL, which carries the database password. Prefer
# sourcing it from AWS Secrets Manager via the Secrets Store CSI driver or
# External Secrets Operator; a literal Secret is the fallback when neither is
# installed. Either way the Deployment consumes it under the name below.
#
# Create it imperatively instead of applying this file, so the value never
# reaches a YAML file or your shell history in the first place:
#
#   kubectl -n agui create secret generic agui-backend-secrets \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://USER:PASSWORD@HOST:5432/DBNAME?ssl=require'
#
# Notes on the URL:
#   * The driver must be `postgresql+asyncpg`. `postgresql://` alone selects the
#     synchronous psycopg driver, which is not installed, and the app fails at
#     engine creation.
#   * TLS is `?ssl=require` — asyncpg's spelling. `?sslmode=require` is libpq's
#     and asyncpg rejects it as an unknown parameter.
apiVersion: v1
kind: Secret
metadata:
  name: agui-backend-secrets
  namespace: agui
  labels:
    app.kubernetes.io/name: agui-backend
    app.kubernetes.io/part-of: agui
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://USER:PASSWORD@HOST:5432/DBNAME?ssl=require"
