# The backend's AWS identity, via IRSA (IAM Roles for Service Accounts).
#
# The backend SigV4-signs every AgentCore call (architecture invariant 1), so it
# needs real AWS credentials. IRSA is how it gets them without a static key on
# disk: the annotation below makes EKS project a web-identity token into the pod,
# and the AWS SDK picks it up with no code change and no env var.
#
# The role's trust policy must name this cluster's OIDC provider AND this exact
# service account, or the pod gets credentials for nothing:
#
#   "Condition": {
#     "StringEquals": {
#       "<oidc-provider>:sub": "system:serviceaccount:agui:agui-backend",
#       "<oidc-provider>:aud": "sts.amazonaws.com"
#     }
#   }
#
# Permissions the role needs: bedrock-agentcore:InvokeAgentRuntime on the agent
# runtimes, plus bedrock-agentcore-control:ListAgentRuntimes (and
# ListAgentRuntimeEndpoints) — the catalog is discovered from the AgentCore
# control plane at boot, so without the List permissions the app starts with an
# empty agent list and no error the user can see.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agui-backend
  namespace: agui
  labels:
    app.kubernetes.io/name: agui-backend
    app.kubernetes.io/part-of: agui
  annotations:
    # REPLACE: the IAM role ARN created for this service account.
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/agui-backend
