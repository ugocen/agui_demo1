# Alembic config for the Phase 0 platform DB.
# The database URL is NOT set here — env.py reads DATABASE_URL (falling back to the
# same local SQLite default as app/db.py), so `alembic` and the app never disagree.
# Run from Phase0/backend, e.g.:
#   DATABASE_URL=postgresql+asyncpg://... .venv/bin/alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Logging — keep alembic's own output readable.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
